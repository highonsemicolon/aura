version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/highonsemicolon/aura/apis/gen
plugins:
  - remote: buf.build/protocolbuffers/go
    out: apis/gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: apis/gen
    opt:
      - paths=source_relative
