version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/highonsemicolon/aura/apis/gen
plugins:
  - local: protoc-gen-go
    out: apis/gen
    opt:
      - paths=source_relative
  - local: protoc-gen-go-grpc
    out: apis/gen
    opt:
      - paths=source_relative
